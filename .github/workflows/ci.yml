name: Samantails CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend-tests:
    name: Frontend Tests (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx ng lint --fix=false || true

      - name: Unit tests (headless)
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Build
        run: npx ng build --configuration production

  backend-tests:
    name: Backend Tests (Express)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests (Jest)
        run: npx jest --coverage

      - name: Build
        run: npx tsc

  deploy:
    name: Deploy (simulación)
    needs: [frontend-tests, backend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Simular despliegue
        run: |
          echo "## Despliegue exitoso (simulado)"
          echo "Frontend: dist/samantails/"
          echo "Backend: server/dist/"
          echo "Comando real: rsync/scp a servidor de producción"
