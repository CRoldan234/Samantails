<div class="carousel-wrapper">
  <div class="carousel-header">
    <h1 class="title-news">
      <span>Productos</span> Destacados 🐾
    </h1>
  </div>

  <div class="swiper {{ carouselId }}">
    <div class="swiper-button-prev swiper-button-prev-{{ carouselId }}"></div>
    <div class="swiper-button-next swiper-button-next-{{ carouselId }}"></div>

    <div class="swiper-wrapper">
      <div class="swiper-slide" *ngFor="let item of newsItems">
        <div class="card" (click)="navigateToNews(item.id)">
          <div class="card-paw">🐾</div>
          <div class="card-content">
            <div class="image-container">
              <img [src]="getImageSource(item)" [alt]="item.title" />
              <div class="new-badge">{{ carouselType === 'services' ? 'Servicio' : 'Nuevo' }}</div>
              <div class="price-badge">{{ item.price }}</div>
            </div>
            <div class="card-text">
              <h3 class="title">{{ item.title }}</h3>
              <p class="summary">{{ item.summary }}</p>
              <div class="card-buttons">
                <button>{{ item.category }}</button>
                <button>{{ item.source }}</button>
              </div>
              <div class="card-details">
                <div class="rating" *ngIf="item.rating">⭐ {{ item.rating }}</div>
                <div class="duration" *ngIf="item.duration">⏱ {{ item.duration }}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="swiper-pagination swiper-pagination-{{ carouselId }}"></div>
  </div>
</div>
